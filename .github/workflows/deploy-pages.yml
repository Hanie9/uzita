name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      NESHAN_API_KEY: ${{ secrets.NESHAN_API_KEY }}
      NESHAN_MAP_KEY: ${{ secrets.NESHAN_MAP_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Build Flutter web (PWA)
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          BUILD="${GITHUB_RUN_NUMBER}"
          DART_DEFINES=(--dart-define=API_BASE_URL="$API_BASE_URL")
          if [[ -n "${NESHAN_API_KEY:-}" ]]; then
            DART_DEFINES+=(--dart-define=NESHAN_API_KEY="$NESHAN_API_KEY")
          fi
          if [[ -n "${NESHAN_MAP_KEY:-}" ]]; then
            DART_DEFINES+=(--dart-define=NESHAN_MAP_KEY="$NESHAN_MAP_KEY")
          fi
          flutter build web --release \
            --base-href /uzita/ \
            --build-name="$VERSION" \
            --build-number="$BUILD" \
            "${DART_DEFINES[@]}"
          export BUILD_NUMBER="$BUILD"
          ./scripts/stamp_pwa_version.sh

      - name: Add 404.html for GitHub Pages SPA routing
        run: |
          cp build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

