name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Build Flutter web (PWA)
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          BUILD="${GITHUB_RUN_NUMBER}"
          flutter build web --release \
            --base-href /uzita/ \
            --build-name="$VERSION" \
            --build-number="$BUILD" \
            --dart-define=API_BASE_URL=$API_BASE_URL

      - name: Stamp PWA version (force clients to detect updates)
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//')
          BUILD="${GITHUB_RUN_NUMBER}"
          printf '%s\n' \
            "{\"app_name\":\"uzita\",\"version\":\"${VERSION}\",\"build_number\":\"${BUILD}\",\"package_name\":\"uzita\"}" \
            > build/web/version.json
          # Bust cache for shell HTML on CDNs that ignore Cache-Control
          sed -i "s/manifest.json?v=[0-9]*/manifest.json?v=${BUILD}/g" build/web/index.html
          sed -i "s/logouzita.png?v=[0-9]*/logouzita.png?v=${BUILD}/g" build/web/index.html

      - name: Add 404.html for GitHub Pages SPA routing
        run: |
          cp build/web/index.html build/web/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

