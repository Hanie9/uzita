<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="uzita - Device Control Application">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0175C2">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- Prevent loading external fonts like Google Fonts -->
  <meta http-equiv="Content-Security-Policy" content="font-src 'self' data:; style-src 'self' 'unsafe-inline';">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="uzita">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png?v=UZITA_STAMP_BUILD">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167x167.png?v=UZITA_STAMP_BUILD">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152x152.png?v=UZITA_STAMP_BUILD">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120x120.png?v=UZITA_STAMP_BUILD">

  <link rel="icon" type="image/png" sizes="192x192" href="icons/logouzita.png?v=UZITA_STAMP_BUILD"/>

  <title>uzita</title>
  <link rel="manifest" href="manifest.json?v=UZITA_STAMP_BUILD">

</head>
<body>
  <script>
    window.flutterConfiguration = {
      useLocalCanvasKit: true,
    };
    window.__UZITA_BUILD__ = 'UZITA_STAMP_BUILD';

    (function () {
      var VERSION_KEY = 'uzita_pwa_build_id';
      var reloading = sessionStorage.getItem('uzita_pwa_reloading');

      function assetUrl(path) {
        return new URL(path, document.baseURI).href;
      }

      function clearAppCaches() {
        var tasks = [];
        if ('serviceWorker' in navigator) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            })
          );
        }
        if ('caches' in window) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return caches.delete(k); }));
            })
          );
        }
        return Promise.all(tasks);
      }

      function fetchServerBuildId() {
        var url = assetUrl('version.json') + '?t=' + Date.now();
        return fetch(url, { cache: 'no-store' }).then(function (res) {
          if (!res.ok) throw new Error('version.json HTTP ' + res.status);
          return res.json();
        }).then(function (data) {
          var version = (data.version || '0').toString();
          var build = (data.build_number || '0').toString();
          return version + '+' + build;
        });
      }

      function hardReload() {
        var base = location.href.split('?')[0].split('#')[0];
        location.replace(base + '?cb=' + Date.now() + location.hash);
      }

      function checkForUpdate() {
        return clearAppCaches().then(fetchServerBuildId).then(function (serverBuildId) {
          var embedded = (window.__UZITA_BUILD__ || '').toString();
          var stored = localStorage.getItem(VERSION_KEY);

          if (embedded && serverBuildId && embedded !== serverBuildId && !reloading) {
            sessionStorage.setItem('uzita_pwa_reloading', '1');
            localStorage.setItem(VERSION_KEY, serverBuildId);
            hardReload();
            return;
          }

          if (stored && stored !== serverBuildId && !reloading) {
            sessionStorage.setItem('uzita_pwa_reloading', '1');
            localStorage.setItem(VERSION_KEY, serverBuildId);
            location.reload();
            return;
          }

          localStorage.setItem(VERSION_KEY, serverBuildId);
          sessionStorage.removeItem('uzita_pwa_reloading');
        }).catch(function (err) {
          console.warn('[uzita] PWA version check skipped:', err);
          sessionStorage.removeItem('uzita_pwa_reloading');
        });
      }

      function loadFlutter() {
        var build = (window.__UZITA_BUILD__ || Date.now()).toString();
        var s = document.createElement('script');
        s.src = assetUrl('flutter_bootstrap.js') + '?v=' + encodeURIComponent(build);
        s.async = true;
        s.onerror = function () {
          console.warn('[uzita] bootstrap failed, retrying with cache bust');
          s.src = assetUrl('flutter_bootstrap.js') + '?v=' + Date.now();
        };
        document.body.appendChild(s);
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!sessionStorage.getItem('uzita_pwa_reloading')) {
            sessionStorage.setItem('uzita_pwa_reloading', '1');
            location.reload();
          }
        });
      }

      checkForUpdate().then(loadFlutter);
    })();
  </script>
</body>
</html>
